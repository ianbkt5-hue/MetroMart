<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Rider Application — MetroMart</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;1,9..144,300;1,9..144,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --green:       #1a7a3a;   --green-mid:   #228844;   --green-light: #f0f9f3;
      --green-pale:  #e3f5e9;   --green-glow:  #2db055;
      --ink:         #0f1a12;   --ink-mid:     #2e3d30;   --ink-soft:    #5a6b5c;
      --stone:       #f6f5f1;   --stone-mid:   #ede9e1;   --stone-dark:  #d4cfc4;
      --white:       #ffffff;   --amber:       #e8900a;   --red:         #d63b3b;
      --radius-sm:   8px;       --radius-md:   14px;      --radius-lg:   22px;
      --font-display: 'Fraunces', serif;
      --font-body:    'DM Sans', sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { font-family: var(--font-body); background: var(--stone); color: var(--ink); font-size: 15px; line-height: 1.6; min-height: 100vh; }
    
    .top-bar { background: var(--white); border-bottom: 1px solid var(--stone-dark); padding: 16px 0; position: sticky; top: 0; z-index: 100; }
    .top-bar-inner { max-width: 900px; margin: 0 auto; padding: 0 28px; display: flex; align-items: center; justify-content: space-between; }
    .logo { font-family: var(--font-display); font-size: 20px; font-weight: 600; color: var(--green); letter-spacing: -0.5px; }
    .logo .dot { color: var(--ink); }
    .back-link { font-size: 13px; font-weight: 600; color: var(--green); text-decoration: none; cursor: pointer; transition: opacity .15s; }
    .back-link:hover { opacity: 0.7; }
    
    .container { max-width: 720px; margin: 0 auto; padding: 56px 28px; }
    
    .form-header { margin-bottom: 42px; }
    .form-title { font-family: var(--font-display); font-size: 32px; font-weight: 400; letter-spacing: -.5px; margin-bottom: 12px; }
    .form-subtitle { font-size: 15px; color: var(--ink-soft); line-height: 1.6; }
    
    .form-card { background: var(--white); border: 1.5px solid var(--stone-dark); border-radius: var(--radius-lg); padding: 40px; }
    
    .error-msg { background: #fee; border: 1px solid #fcc; border-radius: var(--radius-md); padding: 12px 16px; color: var(--red); font-size: 14px; margin-bottom: 20px; display: none; }
    .error-msg.show { display: block; }
    
    .field-group { margin-bottom: 20px; }
    .field-group label { display: block; font-size: 13px; font-weight: 600; color: var(--ink); margin-bottom: 7px; letter-spacing: 0.3px; text-transform: uppercase; }
    .field-group input, .field-group select { width: 100%; padding: 11px 14px; border: 1.5px solid var(--stone-dark); border-radius: var(--radius-sm); font-size: 14px; font-family: var(--font-body); color: var(--ink); transition: border-color .18s, box-shadow .18s; }
    .field-group input:focus, .field-group select:focus { outline: none; border-color: var(--green-mid); box-shadow: 0 0 0 3px rgba(34,136,68,.1); }
    .field-group input::placeholder { color: var(--ink-soft); }
    .phone-wrap{display:flex;gap:8px;}
    .phone-prefix{height:48px;padding:0 12px;border:1.5px solid var(--stone-dark);border-radius:11px;background:var(--stone);font-size:14px;font-weight:600;color:var(--ink-mid);display:flex;align-items:center;gap:6px;flex-shrink:0;font-family:'DM Sans',sans-serif;}
    .phone-input{flex:1;}
    .phone-input input{width:100%;height:48px;padding:0 14px;border:1.5px solid var(--stone-dark);border-radius:11px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--ink);background:var(--stone);outline:none;transition:border-color .18s,background .18s,box-shadow .18s;}
    .phone-input input:focus{border-color:var(--green-mid);background:var(--white);box-shadow:0 0 0 3px rgba(34,136,68,.1);}
    .phone-input input::placeholder{color:var(--stone-dark);font-size:13px;}
    .phone-hint{font-size:11px;color:var(--ink-soft);margin-top:5px;}
    .phone-hint.error{color:var(--red);}
    .email-hint{font-size:11px;color:var(--ink-soft);margin-top:5px;}
    .email-hint.error{color:var(--red);}
    
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .field-row .field-group { margin-bottom: 0; }
    
    .file-input-wrap { position: relative; }
    .file-input { position: relative; display: flex; flex-direction: column; }
    .file-input input[type="file"] { padding: 32px 14px; border: 2px dashed var(--stone-dark); border-radius: var(--radius-md); background: var(--green-light); cursor: pointer; transition: border-color .18s, background .18s; }
    .file-input input[type="file"]:hover { border-color: var(--green); background: var(--green-pale); }
    
    .section-divider { height: 1px; background: var(--stone-mid); margin: 28px 0; }
    .section-label { font-size: 12px; font-weight: 700; color: var(--ink-soft); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 20px; }
    
    .form-actions { display: flex; gap: 12px; margin-top: 32px; }
    .btn { padding: 12px 28px; border-radius: 40px; font-size: 14px; font-weight: 600; border: none; cursor: pointer; transition: all .18s; font-family: inherit; }
    .btn-primary { background: var(--green); color: var(--white); }
    .btn-primary:hover { background: var(--green-mid); transform: translateY(-1px); }
    .btn-secondary { background: transparent; color: var(--green); border: 1.5px solid var(--stone-dark); text-decoration: none; display: inline-flex; align-items: center; }
    .btn-secondary:hover { border-color: var(--green); }
    
    @media (max-width: 600px) {
      .container { padding: 40px 18px; }
      .form-card { padding: 28px 20px; }
      .form-title { font-size: 24px; }
      .field-row { grid-template-columns: 1fr; gap: 0; }
    }
  </style>
</head>
<body>
  <div class="top-bar">
    <div class="top-bar-inner">
      <div class="logo">Metro<span class="dot">Mart</span></div>
      <a class="back-link" onclick="window.location.href='index.html'">← Back</a>
    </div>
  </div>

  <div class="container">
    <div class="form-header">
      <h1 class="form-title">Apply as Rider</h1>
      <p class="form-subtitle">Join MetroMart and start earning by delivering orders. Share your details, driver's license, and a face photo.</p>
    </div>

    <div class="form-card">
      <div class="error-msg" id="msg"></div>

      <div class="field-row">
        <div class="field-group">
          <label for="fname">First name *</label>
          <input id="fname" type="text" placeholder="Your first name">
        </div>
        <div class="field-group">
          <label for="lname">Last name *</label>
          <input id="lname" type="text" placeholder="Your last name">
        </div>
      </div>

      <div class="field-row">
        <div class="field-group">
          <label for="email">Email *</label>
          <input id="email" type="email" placeholder="juan@gmail.com" autocomplete="email" oninput="validateEmailLive('email','emailHint')">
          <div class="email-hint" id="emailHint" style="display:none;"></div>
        </div>
        <div class="field-group">
          <label for="phone">Phone *</label>
          <div class="phone-wrap">
            <div class="phone-prefix">🇵🇭 +63</div>
            <div class="phone-input">
              <input id="phone" type="tel" maxlength="10" placeholder="9xxxxxxxxx" autocomplete="tel" oninput="validatePhoneLive('phone','phoneHint')">
            </div>
          </div>
          <div class="phone-hint" id="phoneHint">Philippine number — 10 digits starting with 9 (e.g. 9171234567)</div>
        </div>
      </div>

      <div class="field-row">
        <div class="field-group">
          <label for="password">Password *</label>
          <input id="password" type="password" placeholder="Create a password">
        </div>
        <div class="field-group">
          <label for="confirm">Confirm password *</label>
          <input id="confirm" type="password" placeholder="Repeat password">
        </div>
      </div>

      <div class="field-group">
        <label for="vehicle">Vehicle type *</label>
        <select id="vehicle">
          <option value="motorcycle">Motorcycle</option>
          <option value="bicycle">Bicycle</option>
          <option value="car">Car</option>
        </select>
      </div>

      <div class="section-divider"></div>
      <div class="section-label">Documentation</div>

      <div class="field-group file-input-wrap">
        <label for="license">Driver's license (image or PDF) *</label>
        <div class="file-input">
          <input id="license" type="file" accept="image/*,application/pdf">
        </div>
      </div>

      <div class="field-group file-input-wrap">
        <label for="photo">Face photo *</label>
        <div class="file-input">
          <input id="photo" type="file" accept="image/*">
        </div>
      </div>

      <div class="form-actions">
        <button class="btn btn-primary" id="submitBtn">Submit Application</button>
        <a class="btn btn-secondary" href="index.html">Cancel</a>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('submitBtn').type = 'button';
    function validatePhoneLive(inputId = 'phone', hintId = 'phoneHint') {
      const raw = document.getElementById(inputId).value.replace(/\D/g,'');
      const hint = document.getElementById(hintId);
      if (!raw) {
        hint.textContent = 'Philippine number — 10 digits starting with 9 (e.g. 9171234567)';
        hint.className = 'phone-hint';
        hint.style.color = '';
        return;
      }
      if (raw.length === 10 && raw.startsWith('9')) {
        hint.textContent = '✓ Valid Philippine number';
        hint.className = 'phone-hint';
        hint.style.color = 'var(--green)';
      } else {
        hint.textContent = 'Must be 10 digits starting with 9 (e.g. 9171234567)';
        hint.className = 'phone-hint error';
        hint.style.color = 'var(--red)';
      }
    }

    function validateEmailLive(inputId = 'email', hintId = 'emailHint') {
      const email = document.getElementById(inputId).value.trim();
      const hint = document.getElementById(hintId);
      if (!email) {
        hint.style.display = 'none';
        return;
      }
      hint.style.display = 'block';
      const basic = /^[^\s@]+@[^\s@]+$/.test(email);
      if (!basic) {
        hint.textContent = '✗ Enter a valid email address';
        hint.style.color = 'var(--red)';
      } else {
        hint.textContent = '✓ Valid email address';
        hint.style.color = 'var(--green)';
      }
    }

    document.getElementById('submitBtn').addEventListener('click', async () => {
      const msg = document.getElementById('msg');
      msg.classList.remove('show');
      
      const fname = document.getElementById('fname').value.trim();
      const lname = document.getElementById('lname').value.trim();
      const email = document.getElementById('email').value.trim();
      const phone = document.getElementById('phone').value.replace(/\D/g,'').replace(/^0/, '');
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm').value;
      const vehicle = document.getElementById('vehicle').value;

      if (!fname || !lname) {
        msg.textContent = 'First and last name are required.';
        msg.classList.add('show');
        return;
      }
      if (!email) {
        msg.textContent = 'Email is required so you can check application status after submitting.';
        msg.classList.add('show');
        return;
      }
      const basicEmail = /^[^\s@]+@[^\s@]+$/.test(email);
      if (!basicEmail) {
        msg.textContent = 'Please enter a valid email address.';
        msg.classList.add('show');
        return;
      }
      if (!phone) {
        msg.textContent = 'Phone number is required.';
        msg.classList.add('show');
        return;
      }
      if (!password || !confirm) {
        msg.textContent = 'Please enter and confirm your password.';
        msg.classList.add('show');
        return;
      }
      if (password !== confirm) {
        msg.textContent = 'Passwords do not match.';
        msg.classList.add('show');
        return;
      }
      if (password.length < 8) {
        msg.textContent = 'Password must be at least 8 characters.';
        msg.classList.add('show');
        return;
      }
      if (!/[A-Z]/.test(password)) {
        msg.textContent = 'Password must contain at least one uppercase letter.';
        msg.classList.add('show');
        return;
      }
      if (!/[0-9]/.test(password)) {
        msg.textContent = 'Password must contain at least one number.';
        msg.classList.add('show');
        return;
      }
      if (!/[^A-Za-z0-9]/.test(password)) {
        msg.textContent = 'Password must contain at least one special character.';
        msg.classList.add('show');
        return;
      }

      const form = new FormData();
      form.append('fname', fname);
      form.append('lname', lname);
      form.append('email', email);
      form.append('phone', phone);
      form.append('vehicle_type', vehicle);
      form.append('password', password);
      form.append('confirm', confirm);

      const lic = document.getElementById('license').files[0];
      if (lic) form.append('license', lic);
      const photo = document.getElementById('photo').files[0];
      if (photo) form.append('photo', photo);

      try {
        const r = await fetch('api/applications/riders.php', { method: 'POST', body: form });
        const d = await r.json();
        if (!d.ok) {
          msg.textContent = d.error || 'Submission failed. Please try again.';
          msg.classList.add('show');
          return;
        }
        alert('✓ Application submitted — thank you! We\'ll review it shortly.');
        window.location.href = 'index.html';
      } catch(e) {
        msg.textContent = 'Network error. Please check your connection and try again.';
        msg.classList.add('show');
      }
    });
  </script>
</body>
</html>
