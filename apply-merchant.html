<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Apply as Merchant — MetroMart</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>body{padding:24px;max-width:820px;margin:0 auto} .form-group{margin-bottom:12px}</style>
</head>
<body>
  <h2>Merchant Application</h2>
  <p>The employee applies on behalf of the merchant. Provide store details and the employee's info and uploads.</p>
  <form id="merchantForm">
    <div class="form-group"><label>Store / Merchant Name*</label><input name="merchant_name" required></div>
    <div class="form-group"><label>Address</label><input name="address"></div>
    <div class="form-row" style="display:flex;gap:8px">
      <div class="form-group" style="flex:1"><label>Latitude</label><input name="latitude"></div>
      <div class="form-group" style="flex:1"><label>Longitude</label><input name="longitude"></div>
    </div>
    <hr>
    <h4>Employee / Manager who will manage this store</h4>
    <div class="form-group"><label>First name*</label><input name="employee_fname" required></div>
    <div class="form-group"><label>Last name*</label><input name="employee_lname" required></div>
    <div class="form-group"><label>Email</label><input name="employee_email" type="email"></div>
    <div class="form-group"><label>Phone (10 digits)</label><input name="employee_phone" pattern="[0-9]{10}"></div>
    <div class="form-group"><label>Face photo (image)</label><input name="employee_face" type="file" accept="image/*"></div>
    <div class="form-group"><label>Valid ID (image)</label><input name="employee_id" type="file" accept="image/*"></div>
    <div style="margin-top:18px;"><button type="submit">Submit Application</button></div>
  </form>
  <div id="msg" style="margin-top:14px;color:green"></div>
  <script>
    const form = document.getElementById('merchantForm');
    form.addEventListener('submit', async e => {
      e.preventDefault();
      const fd = new FormData(form);
      const res = await fetch('api/applications/merchants.php', { method: 'POST', body: fd });
      const d = await res.json();
      const msg = document.getElementById('msg');
      if (!d.ok) { msg.style.color='red'; msg.textContent = d.error || 'Submission failed'; return; }
      msg.style.color='green'; msg.textContent = 'Application submitted — ID: ' + (d.data.id || '—');
      form.reset();
    });
  </script>
</body>
</html>
